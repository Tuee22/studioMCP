# docker-compose.yaml
#
# Purpose: Launch the outer development container only.
# The application stack runs in kind, not in compose.
# See: documents/engineering/docker_policy.md
# See: documents/engineering/k8s_native_dev_policy.md

services:
  studiomcp:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: env
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    volumes:
      - .:/workspace
      - ./.data:/.data
      - /var/run/docker.sock:/var/run/docker.sock

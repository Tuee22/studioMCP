apiVersion: v2
name: studiomcp
description: Kubernetes-native development and deployment chart for studioMCP
type: application
version: 0.1.0
appVersion: "0.1.0"

# Third-party service dependencies
# All deployed via HA Helm charts per Third-Party Service Deployment Doctrine
# See documents/engineering/k8s_storage.md and DEVELOPMENT_PLAN.md
dependencies:
  # Official charts with native HA support
  - name: minio
    repository: https://charts.min.io/
    version: "~5"
    condition: minio.enabled
  - name: pulsar
    repository: https://pulsar.apache.org/charts
    version: "~3"
    condition: pulsar.enabled
  # Bitnami charts for services lacking official HA
  - name: postgresql-ha
    repository: https://charts.bitnami.com/bitnami
    version: "~14"
    condition: postgresql.enabled
  - name: redis
    repository: https://charts.bitnami.com/bitnami
    version: "~19"
    condition: redis.enabled
  - name: keycloak
    repository: https://charts.bitnami.com/bitnami
    version: "~21"
    condition: keycloak.enabled

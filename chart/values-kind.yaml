# Kind (Kubernetes in Docker) development configuration
# Use with: helm install studiomcp chart -f chart/values.yaml -f chart/values-kind.yaml
#
# NOTE: Per Third-Party Service Deployment Doctrine, full HA replica counts are
# maintained in local kind development. However, pod anti-affinity rules are
# relaxed to allow all replicas to schedule on a single-node kind cluster.
#
# IMPORTANT: Production values files (values.yaml, values-prod.yaml, values-saas.yaml)
# must retain hard anti-affinity to ensure proper HA pod distribution across nodes.
# The soft anti-affinity below is DEVELOPMENT-ONLY.
#
# See documents/engineering/k8s_storage.md

image:
  pullPolicy: IfNotPresent

# Full HA for MCP server (matches production)
studiomcp:
  replicas: 3
  autoscaling:
    enabled: false
  health:
    enabled: true

# Full HA for workers (matches production)
worker:
  enabled: true
  replicas: 3
  autoscaling:
    enabled: false

# BFF enabled with HA
bff:
  enabled: true
  replicas: 2

# MinIO with persistence and full HA
# 4 replicas for distributed mode
minio:
  enabled: true
  mode: distributed
  replicas: 4
  persistence:
    enabled: true
    storageClass: "studiomcp-manual"
    size: 10Gi

# Pulsar with persistence and full HA
# 3 replicas per component
# NOTE: Pulsar chart uses volumes.data/journal/ledgers structure, not persistence
# Anti-affinity disabled for single-node kind cluster (DEVELOPMENT-ONLY)
pulsar:
  enabled: true
  affinity:
    anti_affinity: false
  zookeeper:
    replicaCount: 3
    volumes:
      data:
        size: 5Gi
        storageClassName: "studiomcp-manual"
  bookkeeper:
    replicaCount: 3
    volumes:
      journal:
        size: 10Gi
        storageClassName: "studiomcp-manual"
      ledgers:
        size: 10Gi
        storageClassName: "studiomcp-manual"
  broker:
    replicaCount: 3
  proxy:
    replicaCount: 2
    # CRITICAL: Must be ClusterIP for kind - LoadBalancer never gets external IP
    # causing helm --wait to timeout after 5 minutes
    service:
      type: ClusterIP

# PostgreSQL-HA with persistence
# 3 replicas
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
postgresql-ha:
  enabled: true
  postgresql:
    replicaCount: 3
    podAntiAffinityPreset: soft
  persistence:
    enabled: true
    storageClass: "studiomcp-manual"
    size: 5Gi
  pgpool:
    replicaCount: 2
    podAntiAffinityPreset: soft

# Redis with Sentinel mode for HA
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
redis:
  enabled: true
  architecture: replication
  sentinel:
    enabled: true
  master:
    podAntiAffinityPreset: soft
    persistence:
      enabled: true
      storageClass: "studiomcp-manual"
      size: 2Gi
  replica:
    replicaCount: 3
    podAntiAffinityPreset: soft
    persistence:
      enabled: true
      storageClass: "studiomcp-manual"
      size: 2Gi

# Keycloak with HA
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
keycloak:
  enabled: true
  replicaCount: 2
  podAntiAffinityPreset: soft

# LLM reference disabled
llmReference:
  enabled: false

# No ingress for local development (use port-forward)
ingress:
  enabled: false

# Kind (Kubernetes in Docker) development configuration
# Use with: helm install studiomcp chart -f chart/values.yaml -f chart/values-kind.yaml
#
# NOTE: Per Third-Party Service Deployment Doctrine, full HA replica counts are
# maintained in local kind development. However, pod anti-affinity rules are
# relaxed to allow all replicas to schedule on a single-node kind cluster.
#
# IMPORTANT: Production values files (values.yaml, values-prod.yaml, values-saas.yaml)
# must retain hard anti-affinity to ensure proper HA pod distribution across nodes.
# The soft anti-affinity below is DEVELOPMENT-ONLY.
#
# See documents/engineering/k8s_storage.md

image:
  pullPolicy: IfNotPresent

global:
  publicBaseUrl: "http://localhost:8081"
  objectStorage:
    publicEndpoint: "http://localhost:9000"

harbor:
  enabled: true
  expose:
    type: nodePort
    tls:
      enabled: false
      certSource: none
    nodePort:
      ports:
        http:
          port: 80
          nodePort: 32443
        https:
          port: 443
          nodePort: 32444
  externalURL: "http://localhost:32443"
  existingSecretAdminPassword: studiomcp-harbor-admin
  existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD
  imagePullPolicy: IfNotPresent
  registry:
    # Harbor sits behind the nodePort edge in kind, so registry upload locations
    # must stay relative to the external host that clients already reached.
    relativeurls: true
  metrics:
    enabled: false
  trivy:
    enabled: false
  persistence:
    enabled: true
    persistentVolumeClaim:
      registry:
        storageClass: "studiomcp-manual"
        size: 10Gi
    imageChartStorage:
      disableredirect: true
      # The local dev Harbor registry uses filesystem-backed image storage on a
      # manual PV. This avoids the S3 upload-offset races seen against the
      # MinIO-backed path while keeping published images available across Harbor
      # pod restarts during helm-driven deploys.
      type: filesystem
      filesystem:
        rootdirectory: /storage
  database:
    type: external
    external:
      host: studiomcp-postgresql-ha-pgpool
      port: "5432"
      username: harbor
      coreDatabase: harbor
      password: harbor123
      sslmode: disable
  redis:
    type: external
    external:
      addr: "studiomcp-redis-master:6379"
      password: redis123
  jobservice:
    maxJobWorkers: 2
    # File-backed job logs would require an extra Harbor PVC. The local kind
    # path keeps job logs on stdout and persists only the registry image data.
    jobLoggers:
      - stdout

auth:
  enabled: true
  # Additional issuers for Kind environment to support outer-container test pattern.
  # Tokens from integration tests use host.docker.internal:8081 to reach Keycloak,
  # so the server must accept this issuer in addition to the public and internal ones.
  #
  # IMPORTANT: The localhost:8081 entry serves as a wildcard pattern trigger.
  # The validateTokenIssuer function checks if any additional issuer matches
  # "http://localhost:PORT/kc/realms/REALM" pattern. If so, it accepts ANY
  # localhost issuer with the same realm suffix. This supports the outer-container
  # test pattern where validation code obtains tokens via port-forward to Keycloak
  # with dynamic ports (e.g., localhost:39051, localhost:39054, etc.).
  additionalIssuers:
    - "http://host.docker.internal:8081/kc/realms/studiomcp"
    - "http://localhost:8081/kc/realms/studiomcp"

# Full HA for MCP server (matches production)
studiomcp:
  replicas: 3
  autoscaling:
    enabled: false
  health:
    enabled: true

# Full HA for workers (matches production)
worker:
  enabled: true
  replicas: 3
  autoscaling:
    enabled: false

# BFF enabled with HA
bff:
  enabled: true
  replicas: 2

# MinIO with persistence and full HA
# 4 replicas for distributed mode
minio:
  enabled: true
  mode: distributed
  replicas: 4
  service:
    type: NodePort
    nodePort: 32000
  persistence:
    enabled: true
    storageClass: "studiomcp-manual"
    size: 10Gi

# Pulsar with persistence and full HA
# 3 replicas per component
# NOTE: Pulsar chart uses volumes.data/journal/ledgers structure, not persistence
# Anti-affinity disabled for single-node kind cluster (DEVELOPMENT-ONLY)
pulsar:
  enabled: true
  kube-prometheus-stack:
    enabled: false
  affinity:
    anti_affinity: false
  zookeeper:
    replicaCount: 3
    podMonitor:
      enabled: false
    volumes:
      data:
        size: 5Gi
        storageClassName: "studiomcp-manual"
  bookkeeper:
    replicaCount: 3
    podMonitor:
      enabled: false
    volumes:
      journal:
        size: 10Gi
        storageClassName: "studiomcp-manual"
      ledgers:
        size: 10Gi
        storageClassName: "studiomcp-manual"
  autorecovery:
    podMonitor:
      enabled: false
  broker:
    replicaCount: 3
    podMonitor:
      enabled: false
  proxy:
    replicaCount: 2
    podMonitor:
      enabled: false
    # CRITICAL: Must be ClusterIP for kind - LoadBalancer never gets external IP
    # causing helm --wait to timeout after 5 minutes
    service:
      type: ClusterIP

# PostgreSQL-HA with persistence
# 3 replicas
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
postgresql-ha:
  enabled: true
  postgresql:
    replicaCount: 3
    podAntiAffinityPreset: soft
  persistence:
    enabled: true
    storageClass: "studiomcp-manual"
    size: 5Gi
  pgpool:
    replicaCount: 1
    podAntiAffinityPreset: soft
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 768Mi
    customUsers:
      usernames: harbor
      passwords: harbor123

# Redis with Sentinel mode for HA
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
redis:
  enabled: true
  architecture: replication
  sentinel:
    enabled: true
  master:
    podAntiAffinityPreset: soft
    persistence:
      enabled: true
      storageClass: "studiomcp-manual"
      size: 2Gi
  replica:
    replicaCount: 3
    podAntiAffinityPreset: soft
    persistence:
      enabled: true
      storageClass: "studiomcp-manual"
      size: 2Gi

# Keycloak with HA
# Soft anti-affinity for single-node kind cluster (DEVELOPMENT-ONLY)
keycloak:
  enabled: true
  replicaCount: 2
  podAntiAffinityPreset: soft

# LLM reference enabled with mock server for local development
llmReference:
  enabled: true
  mock: true

ingress:
  enabled: true
  className: nginx
  # Prefixes are preserved at the edge. MCP, BFF, and Keycloak all accept
  # their canonical public prefixes directly.
  annotations:
    # Enable session affinity based on Mcp-Session-Id header for stateful MCP sessions
    # This ensures requests with the same MCP session go to the same pod
    nginx.ingress.kubernetes.io/upstream-hash-by: "$http_mcp_session_id"
    # NOTE: X-Upstream-Addr header for horizontal-scale validation is exposed via
    # proxy-set-headers ConfigMap. See ensureKindIngressController in Cluster.hs.
    # This is preferred over configuration-snippet because configuration-snippet
    # with more_set_headers is flagged as risky by nginx-ingress 1.14+ and causes
    # the ingress to not be synced (no Address assigned = 404 errors).
  hosts:
    - host: ""
      paths:
        - path: /mcp
          pathType: Prefix
          service: studiomcp
          port: 3000
        - path: /api
          pathType: Prefix
          service: bff
          port: 3002
        - path: /kc
          pathType: Prefix
          service: keycloak
          port: 80
        - path: /minio
          pathType: Prefix
          service: minio-console
          port: 9001
  tls: []

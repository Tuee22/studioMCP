{{- if and (not .Values.secrets.external) .Values.secrets.jwt.signingKey }}
# Application-specific secrets not managed by subcharts
# Note: MinIO, PostgreSQL, Redis, Keycloak credentials are managed by their respective subcharts
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "studiomcp.fullname" . }}-jwt
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  jwt-signing-key: {{ .Values.secrets.jwt.signingKey | quote }}
{{- end }}

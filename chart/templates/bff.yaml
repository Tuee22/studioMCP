{{- if .Values.bff.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studiomcp.fullname" . }}-bff
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: bff
spec:
  replicas: {{ .Values.bff.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
      app.kubernetes.io/component: bff
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
        app.kubernetes.io/component: bff
    spec:
      serviceAccountName: {{ include "studiomcp.fullname" . }}
      containers:
        - name: bff
          image: "{{ .Values.bff.image.repository }}:{{ .Values.bff.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/bin/tini", "--", "studiomcp", "bff"]
          env:
            - name: STUDIO_MCP_MODE
              value: "server"
            - name: STUDIO_MCP_BFF_PORT
              value: {{ .Values.bff.service.port | quote }}
            - name: STUDIO_MCP_BFF_MCP_ENDPOINT
              value: "http://{{ .Release.Name }}:{{ .Values.studiomcp.service.port }}"
            - name: STUDIO_MCP_BFF_PUBLIC_BASE_URL
              value: {{ include "studiomcp.publicBaseUrl" . | quote }}
            - name: STUDIO_MCP_BFF_SESSION_COOKIE_NAME
              value: "studiomcp_session"
            - name: STUDIO_MCP_BFF_SESSION_COOKIE_PATH
              value: "/"
            - name: STUDIO_MCP_BFF_SESSION_COOKIE_SECURE
              value: "{{ if .Values.global.tls.enabled }}true{{ else }}false{{ end }}"
            {{- if .Values.llmReference.enabled }}
            - name: STUDIO_MCP_REFERENCE_MODEL_URL
              {{- if .Values.llmReference.mock }}
              value: "http://{{ include "studiomcp.fullname" . }}-llm-reference:{{ .Values.llmReference.port }}/generate"
              {{- else }}
              value: "http://{{ include "studiomcp.fullname" . }}-llm-reference:{{ .Values.llmReference.port }}/api/generate"
              {{- end }}
            {{- end }}
            - name: STUDIO_MCP_PULSAR_HTTP_URL
              value: "http://{{ .Release.Name }}-pulsar-proxy"
            - name: STUDIO_MCP_PULSAR_BINARY_URL
              value: "pulsar://{{ .Release.Name }}-pulsar-proxy:6650"
            - name: STUDIO_MCP_MINIO_ENDPOINT
              value: "http://{{ .Release.Name }}-minio:9000"
            - name: STUDIO_MCP_MINIO_PUBLIC_ENDPOINT
              value: {{ include "studiomcp.objectStoragePublicEndpoint" . | quote }}
            - name: STUDIO_MCP_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootUser
            - name: STUDIO_MCP_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootPassword
            {{- if .Values.redis.enabled }}
            - name: STUDIO_MCP_REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            - name: STUDIO_MCP_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.redisSecretName" . }}
                  key: redis-password
            {{- end }}
            {{- if .Values.keycloak.enabled }}
            - name: STUDIOMCP_KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: STUDIOMCP_KEYCLOAK_ISSUER
              value: {{ include "studiomcp.keycloakPublicIssuer" . | quote }}
            # Use ADDITIONAL_ISSUERS (plural) to match loadAuthConfigFromEnv which reads this var
            # The internal issuer is the first entry, used by keycloakEndpointBase for token/JWKS endpoints
            - name: STUDIOMCP_KEYCLOAK_ADDITIONAL_ISSUERS
              value: {{ include "studiomcp.keycloakInternalIssuer" . | quote }}
            - name: STUDIOMCP_KEYCLOAK_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            - name: STUDIOMCP_KEYCLOAK_CLIENT_ID
              value: {{ .Values.auth.bffClientId | quote }}
            - name: STUDIOMCP_KEYCLOAK_CLIENT_SECRET
              value: {{ .Values.auth.bffClientSecret | quote }}
            {{- end }}
            {{- if .Values.secrets.jwt.jwksUri }}
            - name: STUDIOMCP_JWKS_URI
              value: {{ .Values.secrets.jwt.jwksUri | quote }}
            {{- end }}
            - name: STUDIOMCP_AUTH_ENABLED
              value: "{{ if .Values.auth.enabled }}true{{ else }}false{{ end }}"
          ports:
            - containerPort: {{ .Values.bff.service.port }}
              name: http
          resources:
            {{- toYaml .Values.bff.resources | nindent 12 }}
          {{- if .Values.bff.health.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.bff.health.livenessProbe.path }}
              port: {{ .Values.bff.health.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.bff.health.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bff.health.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.bff.health.readinessProbe.path }}
              port: {{ .Values.bff.health.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.bff.health.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.bff.health.readinessProbe.periodSeconds }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "studiomcp.fullname" . }}-bff
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: bff
spec:
  type: {{ .Values.bff.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: bff
  ports:
    - name: http
      port: {{ .Values.bff.service.port }}
      targetPort: http
{{- if .Values.bff.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "studiomcp.fullname" . }}-bff
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: bff
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "studiomcp.fullname" . }}-bff
  minReplicas: {{ .Values.bff.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.bff.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.bff.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}

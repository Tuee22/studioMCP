apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studiomcp.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: studiomcp
spec:
  replicas: {{ .Values.studiomcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
      app.kubernetes.io/component: studiomcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
        app.kubernetes.io/component: studiomcp
    spec:
      serviceAccountName: {{ include "studiomcp.fullname" . }}
      containers:
        - name: studiomcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: STUDIO_MCP_MODE
              value: {{ .Values.studiomcp.mode | quote }}
            - name: STUDIO_MCP_PORT
              value: {{ .Values.studiomcp.service.port | quote }}
            # Pulsar subchart service endpoints
            - name: STUDIO_MCP_PULSAR_HTTP_URL
              value: "http://{{ .Release.Name }}-pulsar-proxy"
            - name: STUDIO_MCP_PULSAR_BINARY_URL
              value: "pulsar://{{ .Release.Name }}-pulsar-proxy:6650"
            # MinIO subchart service endpoint
            - name: STUDIO_MCP_MINIO_ENDPOINT
              value: "http://{{ .Release.Name }}-minio:9000"
            - name: STUDIO_MCP_MINIO_PUBLIC_ENDPOINT
              value: {{ include "studiomcp.objectStoragePublicEndpoint" . | quote }}
            - name: STUDIO_MCP_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootUser
            - name: STUDIO_MCP_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootPassword
            # Redis subchart session store (Sentinel mode)
            {{- if .Values.redis.enabled }}
            - name: STUDIO_MCP_REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            - name: STUDIO_MCP_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.redisSecretName" . }}
                  key: redis-password
            {{- end }}
            # Keycloak subchart configuration
            {{- if .Values.keycloak.enabled }}
            - name: STUDIOMCP_KEYCLOAK_REALM
              value: {{ .Values.keycloak.realm | quote }}
            - name: STUDIOMCP_KEYCLOAK_ISSUER
              value: {{ include "studiomcp.keycloakPublicIssuer" . | quote }}
            - name: STUDIOMCP_KEYCLOAK_ADDITIONAL_ISSUERS
              value: {{ include "studiomcp.keycloakAdditionalIssuers" . | quote }}
            - name: STUDIOMCP_KEYCLOAK_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            {{- end }}
            # JWT configuration
            {{- if .Values.secrets.jwt.jwksUri }}
            - name: STUDIOMCP_JWKS_URI
              value: {{ .Values.secrets.jwt.jwksUri | quote }}
            {{- end }}
            # Auth configuration
            - name: STUDIOMCP_AUTH_ENABLED
              value: "{{ if .Values.auth.enabled }}true{{ else }}false{{ end }}"
          ports:
            - containerPort: {{ .Values.studiomcp.service.port }}
              name: http
          resources:
            {{- toYaml .Values.studiomcp.resources | nindent 12 }}
          {{- if .Values.studiomcp.health.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.studiomcp.health.livenessProbe.path }}
              port: {{ .Values.studiomcp.health.livenessProbe.port }}
            initialDelaySeconds: {{ .Values.studiomcp.health.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.studiomcp.health.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.studiomcp.health.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.studiomcp.health.livenessProbe.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.studiomcp.health.readinessProbe.path }}
              port: {{ .Values.studiomcp.health.readinessProbe.port }}
            initialDelaySeconds: {{ .Values.studiomcp.health.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.studiomcp.health.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.studiomcp.health.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.studiomcp.health.readinessProbe.failureThreshold }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "studiomcp.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: studiomcp
spec:
  type: {{ .Values.studiomcp.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: studiomcp
  ports:
    - name: http
      port: {{ .Values.studiomcp.service.port }}
      targetPort: http
{{- if .Values.studiomcp.autoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "studiomcp.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: studiomcp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "studiomcp.fullname" . }}
  minReplicas: {{ .Values.studiomcp.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.studiomcp.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.studiomcp.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.studiomcp.autoscaling.targetMemoryUtilizationPercentage }}
{{- end }}

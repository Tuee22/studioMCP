apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studiomcp.fullname" . }}
spec:
  replicas: {{ .Values.studiomcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
      app.kubernetes.io/component: studiomcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
        app.kubernetes.io/component: studiomcp
    spec:
      containers:
        - name: studiomcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: STUDIO_MCP_MODE
              value: {{ .Values.studiomcp.mode | quote }}
            - name: STUDIO_MCP_PULSAR_HTTP_URL
              value: "http://{{ include "studiomcp.fullname" . }}-pulsar:{{ .Values.pulsar.service.httpPort }}"
            - name: STUDIO_MCP_PULSAR_BINARY_URL
              value: "pulsar://{{ include "studiomcp.fullname" . }}-pulsar:{{ .Values.pulsar.service.binaryPort }}"
            - name: STUDIO_MCP_MINIO_ENDPOINT
              value: "http://{{ include "studiomcp.fullname" . }}-minio:{{ .Values.minio.service.apiPort }}"
            - name: STUDIO_MCP_MINIO_ACCESS_KEY
              value: {{ .Values.minio.rootUser | quote }}
            - name: STUDIO_MCP_MINIO_SECRET_KEY
              value: {{ .Values.minio.rootPassword | quote }}
          ports:
            - containerPort: {{ .Values.studiomcp.service.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "studiomcp.fullname" . }}
spec:
  type: {{ .Values.studiomcp.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: studiomcp
  ports:
    - name: http
      port: {{ .Values.studiomcp.service.port }}
      targetPort: http

{{- if .Values.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "studiomcp.fullname" . }}-minio-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mc alias set local http://{{ include "studiomcp.fullname" . }}-minio:9000 "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}"
              {{- range .Values.minio.buckets }}
              {{- if kindIs "string" . }}
              mc mb --ignore-existing local/{{ . }}
              {{- else }}
              mc mb --ignore-existing local/{{ .name }}
              {{- end }}
              {{- end }}
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootUser
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "studiomcp.minioSecretName" . }}
                  key: rootPassword
{{- end }}

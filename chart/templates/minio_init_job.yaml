{{- if .Values.minio.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "studiomcp.fullname" . }}-minio-init
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              mc alias set local http://{{ include "studiomcp.fullname" . }}-minio:{{ .Values.minio.service.apiPort }} {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }}
              {{- range .Values.minio.buckets }}
              mc mb --ignore-existing local/{{ . }}
              {{- end }}
{{- end }}

{{- if .Values.llmReference.enabled }}
{{- if .Values.llmReference.mock }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "studiomcp.fullname" . }}-llm-reference-mock
data:
  mock_server.py: |
    import json
    from http.server import BaseHTTPRequestHandler, HTTPServer

    ADVISORY_TEXT = (
        "ADVISORY: upload media through /api, then submit workflow runs through "
        "/api/v1/runs and monitor status via /api/v1/runs/:runId/status."
    )

    class Handler(BaseHTTPRequestHandler):
        def _write_json(self, status_code, payload):
            body = json.dumps(payload).encode("utf-8")
            self.send_response(status_code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path == "/healthz":
                self._write_json(200, {"status": "ready"})
                return
            self._write_json(404, {"error": "not-found"})

        def do_POST(self):
            if self.path != "/generate":
                self._write_json(404, {"error": "not-found"})
                return
            content_length = int(self.headers.get("Content-Length", "0"))
            if content_length:
                self.rfile.read(content_length)
            self._write_json(200, {"response": ADVISORY_TEXT})

        def log_message(self, fmt, *args):
            return

    if __name__ == "__main__":
        HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studiomcp.fullname" . }}-llm-reference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
      app.kubernetes.io/component: llm-reference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
        app.kubernetes.io/component: llm-reference
    spec:
      containers:
        - name: llm-reference
          {{- if .Values.llmReference.mock }}
          image: "python:3.12-alpine"
          command: ["python", "/opt/mock/mock_server.py"]
          volumeMounts:
            - name: mock-script
              mountPath: /opt/mock
          {{- else }}
          image: {{ .Values.llmReference.image | quote }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.llmReference.port }}
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      {{- if .Values.llmReference.mock }}
      volumes:
        - name: mock-script
          configMap:
            name: {{ include "studiomcp.fullname" . }}-llm-reference-mock
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "studiomcp.fullname" . }}-llm-reference
spec:
  selector:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: llm-reference
  ports:
    - name: http
      port: {{ .Values.llmReference.port }}
      targetPort: http
{{- end }}

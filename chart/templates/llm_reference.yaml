{{- if .Values.llmReference.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "studiomcp.fullname" . }}-llm-reference
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
      app.kubernetes.io/component: llm-reference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
        app.kubernetes.io/component: llm-reference
    spec:
      containers:
        - name: llm-reference
          image: {{ .Values.llmReference.image | quote }}
          ports:
            - containerPort: {{ .Values.llmReference.port }}
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "studiomcp.fullname" . }}-llm-reference
spec:
  selector:
    app.kubernetes.io/name: {{ include "studiomcp.fullname" . }}
    app.kubernetes.io/component: llm-reference
  ports:
    - name: http
      port: {{ .Values.llmReference.port }}
      targetPort: http
{{- end }}

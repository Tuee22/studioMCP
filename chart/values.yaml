image:
  repository: studiomcp
  tag: latest
  pullPolicy: IfNotPresent

studiomcp:
  replicas: 1
  mode: server
  service:
    type: ClusterIP
    port: 3000

pulsar:
  enabled: true
  image: apachepulsar/pulsar:3.1.2
  service:
    httpPort: 8080
    binaryPort: 6650
  persistence:
    enabled: false
    size: 8Gi

minio:
  enabled: true
  image: minio/minio:latest
  rootUser: minioadmin
  rootPassword: minioadmin123
  service:
    apiPort: 9000
    consolePort: 9001
  buckets:
    - studiomcp-memo
    - studiomcp-artifacts
    - studiomcp-summaries
    - studiomcp-test-fixtures
  persistence:
    enabled: false
    size: 20Gi

llmReference:
  enabled: false
  image: ollama/ollama:latest
  port: 11434

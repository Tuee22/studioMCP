# Kind cluster configuration for studioMCP
# See documents/engineering/k8s_storage.md for storage policy
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: studiomcp
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8081
        protocol: TCP
      - containerPort: 443
        hostPort: 8444
        protocol: TCP
      - containerPort: 32000
        hostPort: 9000
        protocol: TCP
      - containerPort: 32001
        hostPort: 9001
        protocol: TCP
    extraMounts:
      # Bind mount ./.data into the kind node for persistent storage
      # This path is resolved by kind at cluster creation time
      - hostPath: ./.data
        containerPath: /.data
        propagation: HostToContainer

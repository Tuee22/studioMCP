# Kind cluster configuration for studioMCP
# See documents/engineering/k8s_storage.md for storage policy
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: studiomcp
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://studiomcp-harbor-registry:5000"]
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8081
        protocol: TCP
      - containerPort: 32000
        hostPort: 9000
        protocol: TCP
    extraMounts:
      # Bind mount ./.data into the kind node for persistent storage
      # This path is resolved by kind at cluster creation time
      - hostPath: ./.data
        containerPath: /.data
        propagation: HostToContainer

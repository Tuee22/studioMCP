## Compose exists only to launch the outer development container.
## The Haskell CLI inside that container owns kind, Helm, and sidecar lifecycle.
services:
  studiomcp-env:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: env
    command: ["sleep", "infinity"]
    init: true
    stdin_open: true
    tty: true
    working_dir: /workspace
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
      LANG: C.UTF-8
      LC_ALL: C.UTF-8
      STUDIOMCP_KIND_CLUSTER: ${STUDIOMCP_KIND_CLUSTER:-studiomcp}
      STUDIOMCP_KIND_HOST_DATA_PATH: ${STUDIOMCP_KIND_HOST_DATA_PATH:-}
    volumes:
      - ..:/workspace
      # Persistent data stored in project root directory, mounted into container
      # This path is passed through to kind cluster via STUDIOMCP_KIND_HOST_DATA_PATH
      - ../.data:/.data
      - ${HOME}/.docker:/root/.docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
